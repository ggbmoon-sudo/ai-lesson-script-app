services:
  - type: web
    name: eduscript-ai-studio
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm install --omit=dev
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: OPENAI_MODEL
        value: gpt-5.2
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_DRIVE_CLIENT_ID
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
