services:
  - type: web
    name: eduscript-ai-studio
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm install --omit=dev
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: AI_PROVIDER
        value: openai-compatible
      - key: OPENAI_COMPAT_BASE_URL
        value: https://api.newcoin.top
      - key: OPENAI_COMPAT_MODEL
        value: qwen3.6-plus
      - key: OPENAI_COMPAT_DISABLE_THINKING
        value: "true"
      - key: OPENAI_COMPAT_API_KEY
        sync: false
      - key: GOOGLE_DRIVE_CLIENT_ID
        sync: false
      - key: GAMMA_API_KEY
        sync: false
      - key: GAMMA_EXPORT_AS
        value: pptx
      - key: GAMMA_TEXT_MODE
        value: generate
      - key: PUBLIC_BASE_URL
        sync: false
